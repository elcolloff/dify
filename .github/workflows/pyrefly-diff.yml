name: Pyrefly Diff Check
permissions:
  contents: read
jobs:
  pyrefly-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
    - name: Checkout PR branch
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: Setup Python & UV
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        enable-cache: true
    - name: Prepare diagnostics extractor
      run: |
        git show ${{ github.event.pull_request.head.sha }}:api/libs/pyrefly_diagnostics.py > /tmp/pyrefly_diagnostics.py
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: checking extracted diagnostics file"
        printf '%s\n' "--- content of /tmp/pyrefly_diagnostics.py ---"
        if [ -f /tmp/pyrefly_diagnostics.py ]; then
          cat /tmp/pyrefly_diagnostics.py
        else
          echo "FILE NOT FOUND"
        fi
        printf '%s\n' "--- end ---"
        echo "GARALT_DBG: head.sha = $(git rev-parse HEAD 2>/dev/null || echo unknown)"
        echo "GARALT_DBG: GITHUB_REPOSITORY = ${GITHUB_REPOSITORY:-unset}"
      continue-on-error: true
    - name: Run pyrefly on PR branch
      run: echo 'dummy diagnostic' | python3 /tmp/pyrefly_diagnostics.py > /tmp/pyrefly_pr.txt || true
    - name: Check if line counts match
      id: line_count_check
      run: echo "same=false" >> "$GITHUB_OUTPUT"
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request:
    paths:
    - api/**/*.py
